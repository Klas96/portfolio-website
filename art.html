    <script>
    function freezeGif(img) {
        if (img.src.endsWith('.gif')) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const gif = new Image();
            gif.src = img.src;
            gif.onload = function() {
                const aspectRatio = gif.width / gif.height;
                canvas.width = gif.width;
                canvas.height = gif.height;
                context.drawImage(gif, 0, 0, gif.width, gif.height);
                // Set canvas styles to match the image
                canvas.style.position = 'absolute';
                canvas.style.top = '0';
                canvas.style.left = '0';
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.objectFit = 'cover';
                img.parentNode.replaceChild(canvas, img);
            };
        }
    }

    // Filter functionality
    document.addEventListener('DOMContentLoaded', function() {
        const checkboxes = document.querySelectorAll('.checkbox-input');
        const artItems = document.querySelectorAll('.pColMain');

        function filterArt() {
            const selectedFilters = Array.from(checkboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value);

            artItems.forEach(item => {
                const medium = item.getAttribute('data-medium');
                if (selectedFilters.includes(medium)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', filterArt);
        });
    });
    </script>
