runtime: python311
entrypoint: gunicorn -b :$PORT WebApp.wsgi:application

instance_class: F1

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 1
  max_instances: 10

env_variables:
  DJANGO_SETTINGS_MODULE: WebApp.settings
  GOOGLE_CLOUD_PROJECT: personal-cloud-464604

handlers:
  - url: /static
    static_dir: staticfiles/
    secure: always

  - url: /.*
    script: auto
    secure: always 